name: crawlm

# Shared env for the API server and the crawler workers (both import the same
# config module, so both need the DB/Redis/JWT settings).
x-api-env: &api-env
  MONGO_URI: mongodb://${MONGO_USER:-crawlm}:${MONGO_PASSWORD:-crawlm}@mongo:27017
  MONGO_DB: ${MONGO_DB:-crawlm}
  REDIS_URI: redis://redis:6379
  API_PREFIX: /api/v1
  CORS_ORIGIN: http://localhost:${WEB_PORT:-8080}
  JWT_SECRET: ${JWT_SECRET}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@crawlm.local}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
  LOG_LEVEL: info
  LOG_PRETTY: "false"
  CRAWLER_CONCURRENCY: "96"
  CRAWLER_BATCH_SIZE: "256"
  CRAWLER_DOMAIN_DELAY_MS: ${CRAWLER_DOMAIN_DELAY_MS:-1000}
  CRAWLER_MAX_LINKS_PER_PAGE: "40"
  CRAWLER_MAX_INTERNAL_LINKS: "5"
  CRAWLER_MAX_PAGES_PER_DOMAIN: "25"
  CRAWLER_MAX_FRONTIER: "500000"
  CRAWLER_MAX_PAGES: "0"
  CRAWLER_RESPECT_ROBOTS: "true"
  CRAWLER_TIMEOUT_MS: "15000"
  SOURCES_CERTSTREAM_ENABLED: ${SOURCES_CERTSTREAM_ENABLED:-true}
  SOURCES_CERTSTREAM_URL: ${SOURCES_CERTSTREAM_URL:-ws://certstream:8080/full-stream}
  SOURCES_MAX_PER_FLUSH: "200"
  SOURCES_FLUSH_MS: "2000"
  REFRESH_ENABLED: ${REFRESH_ENABLED:-true}
  REFRESH_INTERVAL_MS: ${REFRESH_INTERVAL_MS:-300000}
  REFRESH_BATCH_PER_WORKSPACE: ${REFRESH_BATCH_PER_WORKSPACE:-100}
  REFRESH_MAX_SEEDS_PER_WORKSPACE: ${REFRESH_MAX_SEEDS_PER_WORKSPACE:-200}
  MEILI_URL: http://meilisearch:7700
  MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
  MEILI_INDEX: ${MEILI_INDEX:-websites}
  MEILI_CONTENT_MAX_CHARS: "4000"
  MEILI_MAX_TOTAL_HITS: "10000"
  MEILI_BATCH_SIZE: "1000"
  APP_URL: ${APP_URL:-http://localhost:${WEB_PORT:-8090}}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  MAIL_FROM: ${MAIL_FROM:-Crawlm <no-reply@crawlm.local>}

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    # Cap WiredTiger's cache (defaults to ~50% of RAM) so Mongo doesn't hog memory
    # the search engine needs. Tune via MONGO_CACHE_GB.
    command: ["mongod", "--bind_ip_all", "--wiredTigerCacheSizeGB", "${MONGO_CACHE_GB:-6}"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-crawlm}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-crawlm}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - crawlm

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawlm

  # Search engine. Indexes page metadata for fast, relevant, workspace-scoped search;
  # Mongo stays the source of truth (results are hydrated from it). Internal only.
  meilisearch:
    image: getmeili/meilisearch:v1.15.2
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    deploy:
      resources:
        limits:
          memory: ${MEILI_MEMORY_LIMIT:-4096M}
    networks:
      - crawlm

  api:
    build: ./packages/api
    restart: unless-stopped
    command: ["npx", "tsx", "src/server.ts"]
    environment: *api-env
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - crawlm

  crawler:
    build: ./packages/api
    restart: unless-stopped
    command: ["npx", "tsx", "src/worker.ts"]
    environment: *api-env
    deploy:
      replicas: ${CRAWLER_REPLICAS:-2}
      resources:
        limits:
          memory: 512M
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - crawlm

  # Self-hosted CertStream: connects directly to Certificate Transparency logs and
  # streams newly-issued certs (the public certstream.calidog.io feed is dead).
  certstream:
    image: ghcr.io/d-rickyy-b/certstream-server-go:latest
    restart: unless-stopped
    networks:
      - crawlm

  # External domain-discovery feeds → enqueue fresh domains into the shared frontier.
  sources:
    build: ./packages/api
    restart: unless-stopped
    command: ["npx", "tsx", "src/sources.ts"]
    environment: *api-env
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      certstream:
        condition: service_started
      meilisearch:
        condition: service_started
    networks:
      - crawlm

  web:
    build:
      context: ./packages/web
      args:
        VITE_API_URL: http://localhost:${WEB_PORT:-8080}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - crawlm

volumes:
  mongo_data:
  redis_data:
  meili_data:

networks:
  crawlm:
    driver: bridge

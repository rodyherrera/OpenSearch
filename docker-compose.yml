services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-crawlm}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-crawlm}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - crawlm

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crawlm

  api:
    build: .
    restart: unless-stopped
    command: ["npx", "tsx", "src/server.ts"]
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crawlm

  crawler:
    build: .
    restart: unless-stopped
    command: ["npx", "tsx", "src/worker.ts"]
    env_file: .env
    # Horizontal scaling: every replica shares the same Redis frontier, and the
    # per-domain cooldown is global, so adding workers raises throughput across
    # MORE domains without hammering any single one. Tune with CRAWLER_REPLICAS.
    deploy:
      replicas: ${CRAWLER_REPLICAS:-3}
      resources:
        limits:
          # Hard cap per worker so a runaway container can't OOM the host or
          # starve other projects sharing this machine.
          memory: 512M
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crawlm

volumes:
  mongo_data:
  redis_data:

networks:
  crawlm:
    driver: bridge
